---
- name: render and apply namespace
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'namespace.yml.j2') }}"

- name: render and apply configmap
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'configmap.yml.j2') }}"

- name: render and apply deployment
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'deployment.yml.j2') }}"

- name: render and apply service
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'service.yml.j2') }}"
