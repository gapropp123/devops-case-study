global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: demo-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["192.168.49.2:30080"]

  - job_name: jenkins
    metrics_path: /prometheus/
    basic_auth:
      username: admin
      password_file: /etc/prometheus/secrets/jenkins_password
    static_configs:
      - targets: ["jenkins:8080"]
