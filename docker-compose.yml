services:
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins-controller/Dockerfile
    ports:
      - "8080:8080"
    environment:
      JENKINS_ADMIN_USER: ${JENKINS_ADMIN_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      GHCR_USERNAME: ${GHCR_USERNAME:-}
      GHCR_PAT: ${GHCR_PAT:-}
      KUBECONFIG_DEPLOYER_B64: ${KUBECONFIG_DEPLOYER_B64:-}
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/workspace-src:ro
    networks:
      - cicd-net

  jenkins-agent:
    build:
      context: .
      dockerfile: docker/jenkins-agent/Dockerfile
    depends_on:
      - jenkins
    environment:
      JENKINS_URL: http://jenkins:8080/
      JENKINS_AGENT_NAME: agent-1
      JENKINS_SECRET: ${JENKINS_AGENT_SECRET:-}
      JENKINS_WEB_SOCKET: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - m2_cache:/home/jenkins/.m2
      - .:/workspace-src:ro
    networks:
      - cicd-net
      - minikube

  demo-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8081:8080"
    environment:
      APP_ENV: compose
    networks:
      - cicd-net

networks:
  cicd-net:
    name: cicd-net
    driver: bridge
  minikube:
    external: true

volumes:
  jenkins_home:
  m2_cache:
