server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: demo-app

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  version: ${APP_VERSION:dev}
  commit: ${GIT_COMMIT:unknown}
  environment: ${APP_ENV:local}
  build-time: ${BUILD_TIME:unknown}
  simulate-load:
    enabled: ${SIMULATE_LOAD:false}
    iterations: ${SIMULATE_LOAD_ITERATIONS:20000000}
